services:
  map-variants:
    build: .
    platform: linux/amd64
    profiles:
      - tools
    depends_on:
      - cdot
      - db
      - redis
      - seqrepo
      - uta
    env_file:
      - settings/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    entrypoint: ["python", "-m", "src.map_variants"]
    command: ["--help"]
    volumes:
      - .:/usr/src/app
      - variant-annotation-seqrepo:/usr/local/share/seqrepo
      - ${VARIANT_DATA_DIR:-./data}:/work

  reverse-translate-proteins:
    build: .
    platform: linux/amd64
    profiles:
      - tools
    depends_on:
      - seqrepo
      - uta
    env_file:
      - settings/.env
    entrypoint: ["python", "-m", "src.reverse_translate_protein_variants"]
    command: ["--help"]
    volumes:
      - .:/usr/src/app
      - variant-annotation-seqrepo:/usr/local/share/seqrepo
      - ${VARIANT_DATA_DIR:-./data}:/work

  annotate-clinvar:
    build: .
    platform: linux/amd64
    profiles:
      - tools
    depends_on:
      - redis
    env_file:
      - settings/.env
    environment:
      CLINVAR_CACHE_DIR: /clinvar-cache
    entrypoint: ["python", "-m", "src.annotate_clinvar"]
    command: ["--help"]
    volumes:
      - .:/usr/src/app
      - variant-annotation-clinvar-cache:/clinvar-cache
      - ${VARIANT_DATA_DIR:-./data}:/work

  annotate-gnomad:
    build: .
    platform: linux/amd64
    profiles:
      - tools
    env_file:
      - settings/.env
    environment:
      GNOMAD_CACHE_DIR: /gnomad-cache
    entrypoint: ["python", "-m", "src.annotate_gnomad"]
    command: ["--help"]
    volumes:
      - .:/usr/src/app
      - variant-annotation-gnomad-cache:/gnomad-cache
      - ${VARIANT_DATA_DIR:-./data}:/work

  annotate-spliceai:
    build: .
    platform: linux/amd64
    profiles:
      - tools
    env_file:
      - settings/.env
    environment:
      SPLICEAI_CACHE_DIR: /spliceai-cache
      SPLICEAI_PRECOMPUTED_SNV_VCF: /spliceai-cache/spliceai_scores.masked.snv.hg38.vcf.gz
      SPLICEAI_PRECOMPUTED_INDEL_VCF: /spliceai-cache/spliceai_scores.masked.indel.hg38.vcf.gz
    entrypoint: ["python", "-m", "src.annotate_spliceai"]
    command: ["--help"]
    volumes:
      - .:/usr/src/app
      - variant-annotation-spliceai-cache:/spliceai-cache
      - ${VARIANT_DATA_DIR:-./data}:/work

  flatten-dna-variants:
    build: .
    platform: linux/amd64
    profiles:
      - tools
    env_file:
      - settings/.env
    entrypoint: ["python", "/usr/src/app/src/flatten_dna_variants.py"]
    command: ["--help"]
    volumes:
      - .:/usr/src/app
      - ${VARIANT_DATA_DIR:-./data}:/work

  utilities:
    build: .
    platform: linux/amd64
    profiles:
      - tools
    env_file:
      - settings/.env
    entrypoint: ["python", "-m", "src.utilities"]
    command: ["--help"]
    volumes:
      - .:/usr/src/app
      - ${VARIANT_DATA_DIR:-./data}:/work

  cdot:
    build:
      context: https://github.com/VariantEffect/cdot_rest.git
    image: cdot-rest
    command: bash -c "gunicorn cdot_rest.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - settings/.env
    depends_on:
      - redis
      - seqrepo
    ports:
      - "8011:8000"
    volumes:
      - variant-annotation-seqrepo:/usr/local/share/seqrepo

  db:
    image: postgres:14
    env_file:
      - settings/.env
    ports:
      - "5442:5432"
    expose:
      - 5432
    volumes:
      - variant-annotation-data:/var/lib/postgresql/data

  redis:
    image: redis:7.2.3
    env_file:
      - settings/.env
    ports:
      - "6382:6379"
    volumes:
      - variant-annotation-redis:/data

  seqrepo:
    image: biocommons/seqrepo:2024-12-20
    volumes:
      - variant-annotation-seqrepo:/usr/local/share/seqrepo

  uta:
    image: biocommons/uta:uta_20241220
    environment:
      POSTGRES_PASSWORD: ${UTA_POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./data/uta/uta_20241220.pgd.gz:/tmp/uta_20241220.pgd.gz:ro

volumes:
  variant-annotation-data:
  variant-annotation-redis:
  variant-annotation-seqrepo:
  variant-annotation-clinvar-cache:
  variant-annotation-gnomad-cache:
  variant-annotation-spliceai-cache:
